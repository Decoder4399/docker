version: "3"

services:
  app:
    build: ./app
    container_name: node_app
    depends_on:
      - db
    ports:
      - "3000:3000"

  db:
    image: mongo:6
    container_name: mongo_db
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  mongo_data:
